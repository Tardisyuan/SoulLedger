[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=40 --cov-branch
markers =
    django_db: mark test as needing database access
    xfail: mark test as expected failure
    slow: mark test as slow running
