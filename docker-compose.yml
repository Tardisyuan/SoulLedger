version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soulledger
      POSTGRES_USER: soulledger
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Uncomment ports for local dev only — never expose DB in production
    # ports:
    #   - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Uncomment ports for local dev only — never expose Redis in production
    # ports:
    #   - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python scripts/seed_chinese_data.py &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://soulledger:${DB_PASSWORD}@db:5432/soulledger
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    command: celery -A config.celery worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://soulledger:${DB_PASSWORD}@db:5432/soulledger
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - db

  celery-beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    command: celery -A config.celery beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://soulledger:${DB_PASSWORD}@db:5432/soulledger
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3333:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    volumes:
      - ./scripts:/scripts
      - ./backups:/backups
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=soulledger
      - PGUSER=soulledger
      - PGPASSWORD=${DB_PASSWORD}
    entrypoint: /bin/sh
    command: >
      -c "echo '0 2 * * * /scripts/backup-db.sh /backups' > /etc/crontabs/root &&
          crond -f -l 2"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
