services:
  postgres:
    image: postgres:16-alpine
    container_name: soulledger_postgres
    environment:
      POSTGRES_DB: soulledger
      POSTGRES_USER: ${POSTGRES_USER:-soulledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: soulledger_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: soulledger_backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-soulledger}:${POSTGRES_PASSWORD}@postgres:5432/soulledger
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  celery:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: soulledger_celery
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-soulledger}:${POSTGRES_PASSWORD}@postgres:5432/soulledger
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: soulledger_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: soulledger_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
