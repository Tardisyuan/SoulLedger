                - paragraph [ref=e707]: 近期有很多热心开源的小伙伴陆续为咱们Snowy框架提交PR或者提出好的建议，基本合格的PR我们都接受，这样您的头像就列入到咱们Snowy仓库的贡献者列表啦！
                - paragraph [ref=e708]: 如何贡献
                - paragraph [ref=e709]: 1、fork一份代码至自己的账号下，本地修改您要提的代码，提交至您fork的仓库
                - paragraph [ref=e710]: 2、登录gitee后到Snowy仓库下创建Pull Requests,选择您的仓库到Snowy的dev分支，提交即可
