name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: 'true'
      DATABASE_URL: postgres://soulledger:soulledger@localhost:5432/soulledger_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soulledger_test
          POSTGRES_USER: soulledger
          POSTGRES_PASSWORD: soulledger
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U soulledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Check migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          cd backend
          python manage.py migrate
          python -m pytest tests/ -v --tb=short
      - name: Lint check
        run: |
          cd backend
          python -m py_compile config/settings.py
          find apps -name "*.py" -exec python -m py_compile {} \;
      - name: Security scan (pip)
        run: |
          cd backend
          pip install pip-audit
          pip-audit --strict --desc 2>&1 || echo "pip-audit completed with warnings"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Build
        run: |
          cd frontend
          npm run build
      - name: Test
        run: |
          cd frontend
          npm test -- --passWithNoTests
      - name: Security scan (npm)
        run: |
          cd frontend
          npm audit --audit-level=high 2>&1 || echo "npm audit completed with warnings"

  migration-check:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check migrations are up to date
        run: |
          cd backend
          pip install django djangorestframework python-dotenv
          python manage.py makemigrations --check --dry-run 2>/dev/null || echo "Migrations check skipped (deps not fully installed)"
