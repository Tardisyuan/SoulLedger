name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: 'true'
      DATABASE_URL: postgres://soulledger:soulledger@localhost:5432/soulledger_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soulledger_test
          POSTGRES_USER: soulledger
          POSTGRES_PASSWORD: soulledger
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U soulledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Check migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          cd backend
          python manage.py migrate
          python -m pytest --tb=short -q
      - name: Lint
        run: |
          cd backend
          pip install ruff
          ruff check .
      - name: Security scan
        run: |
          cd backend
          pip install pip-audit
          pip-audit --strict --desc

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Test
        run: |
          cd frontend
          npm test
      - name: Security scan
        run: |
          cd frontend
          npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --project=chromium
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
