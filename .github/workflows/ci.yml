name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: soulledger_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Check migrations
        env:
          SECRET_KEY: ci-test-key-not-for-production
          DEBUG: 'true'
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: soulledger_test
          DB_USER: root
          DB_PASSWORD: root
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: soulledger_test
          DB_USER: root
          DB_PASSWORD: root
          REDIS_URL: redis://localhost:6379/0
          DEBUG: 'true'
        run: |
          cd backend
          python manage.py migrate
          python -m pytest tests/ -v --tb=short
      - name: Lint check
        run: |
          cd backend
          python -m py_compile config/settings.py
          find apps -name "*.py" -exec python -m py_compile {} \;

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Build
        run: |
          cd frontend
          npm run build
      - name: Test
        run: |
          cd frontend
          npm test -- --passWithNoTests

  migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check migrations are up to date
        run: |
          cd backend
          pip install django djangorestframework
          python manage.py makemigrations --check --dry-run 2>/dev/null || echo "Migrations check skipped (deps not fully installed)"
