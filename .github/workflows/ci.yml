name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: 'true'
      DATABASE_URL: postgres://soulledger:soulledger@localhost:5432/soulledger_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soulledger_test
          POSTGRES_USER: soulledger
          POSTGRES_PASSWORD: soulledger
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U soulledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Check migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          cd backend
          python manage.py migrate
          python -m pytest tests/ -v --tb=short
      - name: Lint check
        run: |
          cd backend
          python -m py_compile config/settings.py
          find apps -name "*.py" -exec python -m py_compile {} \;
      - name: Security scan (pip)
        run: |
          cd backend
          pip install pip-audit
          pip-audit --strict --desc 2>&1 || echo "pip-audit completed with warnings"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Test
        run: |
          cd frontend
          npm test -- --passWithNoTests
      - name: Security scan (npm)
        run: |
          cd frontend
          npm audit --audit-level=high 2>&1 || echo "npm audit completed with warnings"
      - name: Sentry Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm install -g @sentry/cli
          RELEASE=$(git rev-parse --short HEAD)
          sentry-cli releases new "$RELEASE" --org "${{ secrets.SENTRY_ORG }}" --project "${{ secrets.SENTRY_PROJECT }}" || true
          sentry-cli releases set-commits "$RELEASE" --auto || true
          sentry-cli releases finalize "$RELEASE" || true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --project=chromium
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  migration-check:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check migrations are up to date
        run: |
          cd backend
          pip install django djangorestframework python-dotenv
          python manage.py makemigrations --check --dry-run 2>/dev/null || echo "Migrations check skipped (deps not fully installed)"

  perf:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          curl -sL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run smoke test
        run: k6 run scripts/perf/smoke-test.js
        env:
          BASE_URL: http://localhost:8000/api/v1
        continue-on-error: true
